<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eko-Söz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }header {
  text-align: center;
  padding: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 28px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: 40px auto;
  background: white;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.home-options {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.card {
  flex: 1;
  padding: 30px;
  border-radius: 15px;
  background: #f5f5f5;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  font-size: 18px;
  font-weight: bold;
}

.card:hover {
  background: #4facfe;
  color: white;
  transform: translateY(-5px);
}

.section {
  display: none;
}

select, button {
  padding: 10px;
  margin: 10px 5px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: #4facfe;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #00c6ff;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f9f9f9;
  border-radius: 10px;
  line-height: 1.6;
}

.back-btn {
  margin-top: 20px;
  background: #ccc;
  color: black;
}

  </style>
</head>
<body><header>Eko-Söz</header><div class="container">  <!-- ANA SAYFA -->  <div id="home">
    <div class="home-options">
      <div class="card" onclick="openSection('donem')">Dönemine Göre</div>
      <div class="card" onclick="openSection('yazar')">Yazarına Göre</div>
      <div class="card" onclick="openSection('tema')">Temasına Göre</div>
    </div>
  </div>  <!-- DÖNEM -->  <div id="donem" class="section">
    <h3> 1. Konuşmacı Dönemini Seçiniz</h3>
    <select>
      <option>Divan Edebiyatı</option>
      <option>Tanzimat</option>
      <option>Servet-i Fünun</option>
      <option>Cumhuriyet</option>
      <option>Geçiş Dönemi</option>
      <option>İslamiyet Öncesi Türk Edebiyatı</option>
      <option>Halk Edebiyatı</option>
      <option>Milli edebiyat</option>
    </select>
  <h3> 2. Konuşmacı Dönemini Seçiniz</h3>
    <select>
     <option>Divan Edebiyatı</option>
     <option>Tanzimat</option>
     <option>Servet-i Fünun</option>
     <option>Cumhuriyet</option>
     <option>Geçiş Dönemi</option>
     <option>İslamiyet Öncesi Türk Edebiyatı</option>
     <option>Halk Edebiyatı</option>
     <option>Milli edebiyat</option>
    </select>
    <button>Metin Oluştur</button><div class="result">
  <h3>Sonuç</h3>
  <p>Burada metin ve analiz görünecek...</p>
</div>

<button class="back-btn" onclick="goHome()">Geri</button>

  </div>  <!-- YAZAR -->  <div id="yazar" class="section">
    <h3>Yazar Seçiniz</h3>
    <select>
      <option>Namık Kemal</option>
      <option>Tevfik Fikret</option>
    </select>
    <select>
      <option>Ahmet Hamdi Tanpınar</option>
      <option>Orhan Veli</option>
    </select>
    <button>Karşılaştır</button><div class="result">
  <h3>Sonuç</h3>
  <p>Burada karşılaştırma sonucu görünecek...</p>
</div>

<button class="back-btn" onclick="goHome()">Geri</button>

  </div>  <!-- TEMA -->  <div id="tema" class="section">
    <h3>Tema Seçiniz</h3>
    <select>
      <option>Ahlak ve Vicdan</option>
      <option>Vatanseverlik ve Özgürlük</option>
      <option>İnsan ve Toplum Çatışması</option>
      <option>Gelenek ve Modernleşme</option>
      <option>Kaderve İrade</option>
      <option>Yaşam ve Ölüm</option>
      <option>Adalet ve Eşitlik</option>
      <option>Aşk ve sevgi</option>
      <option>Yalnızlık ve İç Hesaplaşma</option>
    </select>
    <button>Metin Oluştur</button><div class="result">
  <h3>Sonuç</h3>
  <p>Burada metin ve analiz görünecek...</p>
</div>

<button class="back-btn" onclick="goHome()">Geri</button>

  </div></div><script>
  function openSection(id) {
    document.getElementById('home').style.display = 'none';
    document.getElementById('donem').style.display = 'none';
    document.getElementById('yazar').style.display = 'none';
    document.getElementById('tema').style.display = 'none';

    document.getElementById(id).style.display = 'block';
  }

  function goHome() {
    document.getElementById('home').style.display = 'block';
    document.getElementById('donem').style.display = 'none';
    document.getElementById('yazar').style.display = 'none';
    document.getElementById('tema').style.display = 'none';
  }
</script></body>
</html>
