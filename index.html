<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eko-Söz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #333;
    }header {
  text-align: center;
  padding: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 28px;
  font-weight: bold;
}

.container {
  max-width: 1000px;
  margin: 40px auto;
  background: white;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.options {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
  gap: 10px;
}

.card {
  flex: 1;
  padding: 20px;
  border-radius: 15px;
  background: #f5f5f5;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #4facfe;
  color: white;
  transform: translateY(-5px);
}

.content {
  margin-top: 20px;
}

select, button {
  padding: 10px;
  margin: 10px 5px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: #4facfe;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #00c6ff;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f9f9f9;
  border-radius: 10px;
  line-height: 1.6;
}

  </style>
</head>
<body><header>Eko-Söz</header><div class="container">
  <div class="options">
    <div class="card" onclick="showSection('donem')">Dönemine Göre</div>
    <div class="card" onclick="showSection('yazar')">Yazarına Göre</div>
    <div class="card" onclick="showSection('tema')">Temasına Göre</div>
  </div>  <div id="donem" class="content" style="display:none;">
    <h3>Dönem Seç</h3>
    <select>
      <option>Divan Edebiyatı</option>
      <option>Tanzimat</option>
      <option>Servet-i Fünun</option>
    </select>
    <button>Metin Oluştur</button>
  </div>  <div id="yazar" class="content" style="display:none;">
    <h3>Yazar Seç</h3>
    <select>
      <option>Namık Kemal</option>
      <option>Tevfik Fikret</option>
    </select>
    <select>
      <option>Ahmet Hamdi Tanpınar</option>
      <option>Orhan Veli</option>
    </select>
    <button>Karşılaştır</button>
  </div>  <div id="tema" class="content" style="display:none;">
    <h3>Tema Seç</h3>
    <select>
      <option>Aşk</option>
      <option>Özgürlük</option>
      <option>Doğa</option>
    </select>
    <button>Metin Oluştur</button>
  </div>  <div class="result">
    <h3>Sonuç</h3>
    <p>Burada yapay zeka tarafından oluşturulan metin ve analiz görünecek...</p>
  </div>
</div><script>
  function showSection(sectionId) {
    document.getElementById('donem').style.display = 'none';
    document.getElementById('yazar').style.display = 'none';
    document.getElementById('tema').style.display = 'none';

    document.getElementById(sectionId).style.display = 'block';
  }
</script></body>
</html>
