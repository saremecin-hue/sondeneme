<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eko-Söz</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: #333;
}

header {
  text-align: center;
  padding: 25px;
  color: white;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 1px;
}
select {
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  width: 100%;
}
.container {
  width: 90%;
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.card{
  padding:30px;
  background:#eee;
  margin:10px;
  cursor:pointer;
  border-radius:15px;
}

.section{display:none;}
.home-options {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  flex: 1 1 250px;
  padding: 30px;
  border-radius: 20px;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  text-align: center;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  color: white;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}
button {
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(135deg,#4facfe,#00c6ff);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}
.result {
  margin-top: 20px;
  padding: 20px;
  background: #f4f7fb;
  border-radius: 15px;
  line-height: 1.7;
  max-height: 300px;
  overflow-y: auto;
  font-size: 15px;
}
button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>Eko-Söz</header>

<div class="container">

<!-- HOME -->
<div id="home">
  <div class="card" onclick="openSection('donem')">Dönemine Göre</div>
  <div class="card" onclick="openSection('yazar')">Yazarına Göre</div>
  <div class="card" onclick="openSection('tema')">Temasına Göre</div>
</div>

<!-- DÖNEM -->
<div id="donem" class="section">
<h3>1. Konuşmacı Dönemi Seçiniz</h3>
<select id="donem1" onchange="updateAuthors(1)">
  <option value="tanzimat">Tanzimat</option>
  <option value="servet">Servet-i Fünun</option>
  <option value="cumhuriyet">Cumhuriyet</option>
</select>
<h3>Konuşmacıyı Seçiniz</h3>
<select id="yazar1"></select>
<h3>2. Konuşmacı Dönemi Seçiniz</h3>
<select id="donem2" onchange="updateAuthors(2)">
  <option value="tanzimat">Tanzimat</option>
  <option value="servet">Servet-i Fünun</option>
  <option value="cumhuriyet">Cumhuriyet</option>
</select>
<h3>2. Konuşmacıyı Seçiniz</h3>
<select id="yazar2"></select>

<button id="generateBtn">Metin Oluştur</button>

<div class="result"><p></p></div>

<button onclick="goHome()">Geri</button>

</div>

<!-- YAZAR -->
<div id="yazar" class="section">
<h3>1. Konuşmacıyı Seçiniz</h3>
<select id="yazarA">
<option>Ahmet Hamdi Tanpınar</option>
<option>Halit Ziya Uşaklıgil</option>
<option>Tarık Buğra</option>
</select>
<h3>2. Konuşmacıyı Seçiniz</h3>
<select id="yazarB">
<option>Ahmet Hamdi Tanpınar</option>
<option>Halit Ziya Uşaklıgil</option>
<option>Tarık Buğra</option>
</select>

<button id="generateBtnYazar">Metin Oluştur</button>

<div class="result"><p></p></div>

<button onclick="goHome()">Geri</button>

</div>

<!-- TEMA -->
<div id="tema" class="section">
<h3>Tema Seçiniz</h3>
<select id="temaSec">
<option value="ask">Aşk</option>
<option value="vatan">Vatan</option>
<option value="adalet">Adalet</option>
</select>
<h3>1. Konuşmacıyı Seçiniz</h3>
<select id="yazarT1">
<option>Ahmet Hamdi Tanpınar</option>
<option>Halit Ziya Uşaklıgil</option>
<option>Tarık Buğra</option>
</select>
<h3>2. Konuşmacıyı Seçiniz</h3>
<select id="yazarT2">
<option>Ahmet Hamdi Tanpınar</option>
<option>Halit Ziya Uşaklıgil</option>
<option>Tarık Buğra</option>
</select>

<button id="generateBtnTema">Metin Oluştur</button>

<div class="result"><p></p></div>

<button onclick="goHome()">Geri</button>

</div>

</div>

<script>
<script>

let styleData={}
let themeData=""
let eraData=""

const authorsByEra={
  tanzimat:["Namık Kemal"],
  servet:["Halit Ziya Uşaklıgil"],
  cumhuriyet:["Ahmet Hamdi Tanpınar","Tarık Buğra"]
}

// SAYFA GEÇİŞ
function openSection(id){
  ["home","donem","yazar","tema"].forEach(x=>{
    document.getElementById(x).style.display="none"
  })
  document.getElementById(id).style.display="block"
}

function goHome(){
  openSection("home")
}

// GLOBAL YAP (ÇOK ÖNEMLİ)
window.openSection = openSection;
window.goHome = goHome;

// YAZARLARI DOLDUR
function updateAuthors(n){
  const donem=document.getElementById("donem"+n).value
  const select=document.getElementById("yazar"+n)

  select.innerHTML=""

  authorsByEra[donem].forEach(a=>{
    const opt=document.createElement("option")
    opt.text=a
    select.add(opt)
  })
}

// VERİLERİ YÜKLE
async function loadData(){
  const res1=await fetch("/data/style_vectors.json")
  const res2=await fetch("/data/yazar_temalar.txt")
  const res3=await fetch("/data/edebi_donemler.txt")

  styleData=await res1.json()
  themeData=await res2.text()
  eraData=await res3.text()
}

// API ÇAĞRISI
async function generate(prompt,y1,y2,box){

  const y1_data={
    uslup:styleData[y1],
    tema:themeData
  }

  const y2_data={
    uslup:styleData[y2],
    tema:themeData
  }

  try {
    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        prompt:prompt,
        y1_analiz:y1_data,
        y2_analiz:y2_data,
        donem_verisi:eraData
      })
    })

    const data = await res.json();

    if (data.error) {
      box.innerText = "API Hatası: " + data.error;
      return;
    }

    const content = data.choices?.[0]?.message?.content;

    if (!content) {
      box.innerText = "Boş cevap geldi";
      return;
    }

    box.innerHTML = content
      .split("\n")
      .map(line => `<div>${line}</div>`)
      .join("");

  } catch (err) {
    console.error(err);
    box.innerText = "Bağlantı hatası ⚠️";
  }
}

// BUTTONS
document.addEventListener("DOMContentLoaded",()=>{

  loadData()

  updateAuthors(1)
  updateAuthors(2)

  document.getElementById("generateBtn").onclick=()=>{
    const y1=document.getElementById("yazar1").value
    const y2=document.getElementById("yazar2").value
    const box=document.querySelector("#donem .result p")

    generate(`${y1} ve ${y2} konuşsun`,y1,y2,box)
  }

  document.getElementById("generateBtnYazar").onclick=()=>{
    const y1=document.getElementById("yazarA").value
    const y2=document.getElementById("yazarB").value
    const box=document.querySelector("#yazar .result p")

    generate(`${y1} ve ${y2} karşılaştır`,y1,y2,box)
  }

  document.getElementById("generateBtnTema").onclick=()=>{
    const y1=document.getElementById("yazarT1").value
    const y2=document.getElementById("yazarT2").value
    const tema=document.getElementById("temaSec").value
    const box=document.querySelector("#tema .result p")

    generate(`${y1} ve ${y2} ${tema} hakkında konuşsun`,y1,y2,box)
  }

})

</script>

</body>
</html>
